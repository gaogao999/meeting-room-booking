<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会議室管理 - 会議室予約システム</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">会議室予約システム</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/">予約</a>
        <a class="nav-link active" href="/rooms.html">会議室管理</a>
      </div>
    </div>
  </nav>

  <div class="container my-4">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-header bg-light fw-bold" id="formTitle">会議室の登録</div>
          <div class="card-body">
            <div id="formAlert"></div>
            <form id="roomForm">
              <input type="hidden" id="roomId" />
              <div class="mb-3">
                <label class="form-label">会議室名 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" required />
              </div>
              <div class="mb-3">
                <label class="form-label">場所</label>
                <input type="text" class="form-control" id="location" placeholder="例: 本社 3F" />
              </div>
              <div class="mb-3">
                <label class="form-label">定員</label>
                <input type="number" class="form-control" id="capacity" min="0" />
              </div>
              <div class="mb-3">
                <label class="form-label">説明</label>
                <textarea class="form-control" id="description" rows="2"></textarea>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1" id="submitBtn">登録する</button>
                <button type="button" class="btn btn-outline-secondary d-none" id="cancelEdit">キャンセル</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-header bg-light fw-bold">登録済みの会議室</div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                  <tr>
                    <th>会議室名</th>
                    <th>場所</th>
                    <th>定員</th>
                    <th>説明</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="roomList">
                  <tr><td colspan="5" class="text-center text-muted py-4">読み込み中...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/rooms.js"></script>
</body>
</html>
