<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会議室予約システム</title>
  <link
    href="/vendor/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">会議室予約システム</a>
      <div class="navbar-nav">
        <a class="nav-link active" href="/">予約</a>
        <a class="nav-link" href="/rooms.html">会議室管理</a>
      </div>
      <span class="navbar-text text-white ms-auto" id="currentUser"></span>
    </div>
  </nav>

  <div class="container my-4">
    <div class="row g-4">
      <!-- 予約フォーム -->
      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header bg-light fw-bold">新規予約</div>
          <div class="card-body">
            <div id="formAlert"></div>
            <form id="bookingForm">
              <div class="mb-3">
                <label class="form-label">会議室 <span class="text-danger">*</span></label>
                <select class="form-select" id="roomId" required></select>
              </div>
              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label">部署名 <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="department" required />
                </div>
                <div class="col-6 mb-3">
                  <label class="form-label">氏名 <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="reserver" required />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">日付 <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="date" required />
              </div>
              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label">開始時刻 <span class="text-danger">*</span></label>
                  <select class="form-select" id="startTime" required></select>
                </div>
                <div class="col-6 mb-3">
                  <label class="form-label">終了時刻 <span class="text-danger">*</span></label>
                  <select class="form-select" id="endTime" required></select>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">用件</label>
                <input type="text" class="form-control" id="purpose" placeholder="任意" />
              </div>
              <button type="submit" class="btn btn-primary w-100">予約する</button>
            </form>
            <div class="form-text mt-2" id="ruleHint"></div>
          </div>
        </div>
      </div>

      <!-- 予約一覧 -->
      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-header bg-light d-flex align-items-center">
            <span class="fw-bold">予約一覧</span>
            <div class="ms-auto d-flex gap-2">
              <select class="form-select form-select-sm" id="filterRoom" style="width:auto">
                <option value="">すべての会議室</option>
              </select>
              <input type="date" class="form-control form-control-sm" id="filterDate" style="width:auto" />
            </div>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                  <tr>
                    <th>会議室</th>
                    <th>日時</th>
                    <th>部署 / 氏名</th>
                    <th>用件</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="bookingList">
                  <tr><td colspan="5" class="text-center text-muted py-4">読み込み中...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/vendor/bootstrap.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
