<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スケジュール - 会議室予約システム</title>
  <link href="/vendor/bootstrap.min.css" rel="stylesheet" />
  <link href="/timeline.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="/">会議室予約システム</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/">予約</a>
        <a class="nav-link active" href="/timeline.html">スケジュール</a>
        <a class="nav-link" href="/rooms.html">会議室管理</a>
      </div>
      <span class="navbar-text text-white ms-auto" id="currentUser"></span>
    </div>
  </nav>

  <div class="container-fluid px-4 my-4">
    <!-- 空き会議室の一括検索 -->
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-light fw-bold">時間帯で空き会議室を一括検索</div>
      <div class="card-body">
        <form id="searchForm" class="row g-2 align-items-end">
          <div class="col-auto">
            <label class="form-label mb-1">日付</label>
            <input type="date" class="form-control" id="searchDate" required />
          </div>
          <div class="col-auto">
            <label class="form-label mb-1">開始</label>
            <select class="form-select" id="searchStart" required></select>
          </div>
          <div class="col-auto">
            <label class="form-label mb-1">終了</label>
            <select class="form-select" id="searchEnd" required></select>
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-primary">空きを検索</button>
          </div>
        </form>
        <div id="searchResult" class="mt-3"></div>
      </div>
    </div>

    <!-- スケジュール（タイムライン）-->
    <div class="card shadow-sm">
      <div class="card-header bg-light d-flex align-items-center flex-wrap gap-2">
        <span class="fw-bold">会議予定一覧</span>
        <div class="btn-group btn-group-sm ms-3">
          <button class="btn btn-outline-secondary" id="prevDay">&lt;</button>
          <button class="btn btn-outline-secondary" id="today">本日</button>
          <button class="btn btn-outline-secondary" id="nextDay">&gt;</button>
        </div>
        <input type="date" class="form-control form-control-sm ms-2" id="tlDate" style="width:auto" />
        <span class="ms-auto text-muted small" id="tlDateLabel"></span>
      </div>
      <div class="card-body p-0">
        <div id="timeline" class="timeline"></div>
      </div>
    </div>
    <p class="text-muted small mt-2">
      表示時間帯は 8:00〜20:00 です。バーをクリックすると予約詳細、空き部分をクリックするとその会議室・時刻で予約フォームを開きます。
    </p>
  </div>

  <script src="/vendor/bootstrap.bundle.min.js"></script>
  <script src="/timeline.js"></script>
</body>
</html>
